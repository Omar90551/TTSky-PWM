# Tiny Tapeout project information
project:
  title:        "PWM Generator"
  author:       "Omar, Nitin"
  github:       "Omar90551, palnitin24"
  description:  "A PWM generator with configurable period and duty cycle via 8-bit input pins"
  language:     "Verilog"
  clock_hz:     10000000

  tiles: "1x1"

  top_module:  "tt_um_PWM"

  source_files:
    - "tt_um_PWM.v"
    - "pwm_counter.v"
    - "pwm_comparator.v"

pinout:
  # Inputs
  ui[0]: "period_cfg bit 0"
  ui[1]: "period_cfg bit 1"
  ui[2]: "period_cfg bit 2"
  ui[3]: "period_cfg bit 3"
  ui[4]: "period_cfg bit 4"
  ui[5]: "period_cfg bit 5"
  ui[6]: "period_cfg bit 6"
  ui[7]: "period_cfg bit 7"

  # Outputs
  uo[0]: "pwm_out"
  uo[1]: ""
  uo[2]: ""
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins (used as inputs)
  uio[0]: "duty_cfg bit 0"
  uio[1]: "duty_cfg bit 1"
  uio[2]: "duty_cfg bit 2"
  uio[3]: "duty_cfg bit 3"
  uio[4]: "duty_cfg bit 4"
  uio[5]: "duty_cfg bit 5"
  uio[6]: "duty_cfg bit 6"
  uio[7]: "duty_cfg bit 7"

# Do not change!
yaml_version: 6